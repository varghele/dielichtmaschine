name: QLCAutoShow
channels:
  - conda-forge
dependencies:
  - python>=3.12

  # Core
  - pyqt>=6.5
  - pyyaml>=6.0
  - numpy>=1.24
  - pandas>=2.0
  - pillow>=10.0
  - requests>=2.28

  # Audio
  - sounddevice>=0.4.6
  - soundfile>=0.12
  - librosa>=0.10
  - scipy>=1.10
  - pygame>=2.5

  # DMX USB device detection
  - pyserial>=3.5

  # 3D Visualizer
  - moderngl>=5.8
  - pyglm>=2.7

  # Offline media rendering (headless visualizer -> MP4)
  - imageio-ffmpeg>=0.4.9

  # Tests
  - pytest>=7.0
